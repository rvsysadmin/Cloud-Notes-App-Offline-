<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline Cloud Notes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>☁️ Offline Cloud Notes</h1>

    <input id="title" placeholder="Note Title">
    <input id="search" placeholder="Search notes..." onkeyup="searchNotes()">    
    <textarea id="content" placeholder="Write your note..."></textarea>

    <button onclick="saveNote()">Save Note</button>
    <button onclick="exportNotes()">Export</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <input type="file" onchange="importNotes(event)">

    <button onclick="syncCloud()">Sync (Fake Cloud)</button>

    <div id="notes"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
